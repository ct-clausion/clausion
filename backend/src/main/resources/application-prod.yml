server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/clausion}
    username: ${DATABASE_USERNAME:clausion}
    password: ${DATABASE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: async-ai-

app:
  rabbitmq:
    enabled: false

  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-must-be-at-least-256-bits-long}
    expiration: 86400000

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    base-url: https://api.openai.com/v1
    timeout: 60000

  livekit:
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:secretsecretsecretsecretsecretsecret}
    url: ${LIVEKIT_URL:wss://clausion-3gmrm9tj.livekit.cloud}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://stunning-dedication-production-da63.up.railway.app}

  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:gb-ljs}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.classpulse: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
