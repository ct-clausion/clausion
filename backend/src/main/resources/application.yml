server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/clausion}
    username: ${DATABASE_USERNAME:clausion}
    password: ${DATABASE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: async-ai-

app:
  rabbitmq:
    enabled: true

  jwt:
    # JWT_SECRET must be set via environment variable — there is no safe default.
    # Generate one with: openssl rand -base64 48
    secret: ${JWT_SECRET:}
    expiration: 86400000

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    base-url: https://api.openai.com/v1
    timeout: 60000

  livekit:
    # Set LIVEKIT_API_KEY / LIVEKIT_API_SECRET via environment.
    # Local dev: run livekit-server and use its generated keys. Production: LiveKit Cloud.
    api-key: ${LIVEKIT_API_KEY:}
    api-secret: ${LIVEKIT_API_SECRET:}
    url: ${LIVEKIT_URL:ws://localhost:7880}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://localhost:5173,http://192.168.0.32:5173,https://192.168.0.32:5173,http://192.168.219.45:5173,https://192.168.219.45:5173,https://stunning-dedication-production-da63.up.railway.app}

logging:
  level:
    com.classpulse: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
